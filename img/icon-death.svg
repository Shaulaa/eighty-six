<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Lycoris flower simplified -->
  <g transform="translate(24,26)">
    <!-- Petals -->
    <ellipse cx="0" cy="-10" rx="2.5" ry="8" fill="#c0292b" opacity="0.75"/>
    <ellipse cx="0" cy="-10" rx="2.5" ry="8" fill="#c0292b" opacity="0.75" transform="rotate(60)"/>
    <ellipse cx="0" cy="-10" rx="2.5" ry="8" fill="#c0292b" opacity="0.75" transform="rotate(120)"/>
    <ellipse cx="0" cy="-10" rx="2.5" ry="8" fill="#c0292b" opacity="0.7" transform="rotate(180)"/>
    <ellipse cx="0" cy="-10" rx="2.5" ry="8" fill="#c0292b" opacity="0.75" transform="rotate(240)"/>
    <ellipse cx="0" cy="-10" rx="2.5" ry="8" fill="#c0292b" opacity="0.7" transform="rotate(300)"/>
    <!-- Stamens -->
    <line x1="0" y1="0" x2="0" y2="-16" stroke="#e88" stroke-width="0.7" opacity="0.6" transform="rotate(30)"/>
    <line x1="0" y1="0" x2="0" y2="-16" stroke="#e88" stroke-width="0.7" opacity="0.6" transform="rotate(90)"/>
    <line x1="0" y1="0" x2="0" y2="-16" stroke="#e88" stroke-width="0.7" opacity="0.6" transform="rotate(150)"/>
    <line x1="0" y1="0" x2="0" y2="-16" stroke="#e88" stroke-width="0.7" opacity="0.6" transform="rotate(210)"/>
    <line x1="0" y1="0" x2="0" y2="-16" stroke="#e88" stroke-width="0.7" opacity="0.6" transform="rotate(270)"/>
    <line x1="0" y1="0" x2="0" y2="-16" stroke="#e88" stroke-width="0.7" opacity="0.6" transform="rotate(330)"/>
  </g>
  <!-- Stem -->
  <line x1="24" y1="28" x2="24" y2="44" stroke="#3a5a1a" stroke-width="1.5" opacity="0.5"/>
</svg>
